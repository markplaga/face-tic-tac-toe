<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Face Tic-Tac-Toe</title><style>
:root{--cream:#fff8e8;--gold:#e5c46b;--dark:#0d2825}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at 15% 0%,rgba(229,196,107,.28),transparent 30%),linear-gradient(135deg,#0d2e2b,#12433f 55%,#1f5952);color:var(--cream)}.game{width:min(94vw,640px);padding:24px;border-radius:28px;background:rgba(255,255,255,.1);box-shadow:0 24px 70px rgba(0,0,0,.28);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.22);text-align:center}h1{margin:0 0 8px;font-size:clamp(2rem,7vw,4rem);line-height:1}.sub{margin:0 0 18px;opacity:.9}.status{font-size:1.25rem;font-weight:750;margin:14px 0 18px;min-height:1.6em}.board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:auto;max-width:520px}button.cell{aspect-ratio:1/1;border:0;border-radius:22px;background:rgba(255,248,232,.92);box-shadow:inset 0 -7px 0 rgba(0,0,0,.12),0 10px 18px rgba(0,0,0,.25);cursor:pointer;display:grid;place-items:center;padding:10px;transition:transform .12s ease,background .12s ease}button.cell:hover{transform:translateY(-2px);background:#fff}button.cell:disabled{cursor:default;transform:none}.face{width:90%;height:90%;object-fit:cover;border-radius:50%;border:6px solid var(--gold);box-shadow:0 5px 12px rgba(0,0,0,.3);background:white}.winning{outline:6px solid var(--gold);background:#fff6cf!important}.reset{border:0;border-radius:999px;background:var(--gold);color:var(--dark);font-weight:800;font-size:1rem;padding:12px 20px;cursor:pointer;box-shadow:0 8px 16px rgba(0,0,0,.24);margin-top:20px}.players{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:10px}.player{display:flex;align-items:center;gap:8px;font-weight:700}.mini{width:42px;height:42px;border-radius:50%;object-fit:cover;border:3px solid var(--gold)}
</style></head><body><main class="game"><h1>Face Tic-Tac-Toe</h1><p class="sub">Take turns. Three in a row wins.</p><div class="players"><div class="player"><img class="mini" src="xface.svg" alt="X face"> X</div><div class="player"><img class="mini" src="oface.svg" alt="O face"> O</div></div><div class="status" id="status">X goes first</div><section class="board" id="board" aria-label="Tic-tac-toe board"></section><button class="reset" id="reset">New Game</button></main><script>
const faces={X:'xface.svg',O:'oface.svg'},board=document.getElementById('board'),statusEl=document.getElementById('status'),reset=document.getElementById('reset');let cells,current,gameOver;const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];function init(){cells=Array(9).fill('');current='X';gameOver=false;board.innerHTML='';statusEl.textContent='X goes first';for(let i=0;i<9;i++){const b=document.createElement('button');b.className='cell';b.type='button';b.setAttribute('aria-label',`cell ${i+1}`);b.onclick=()=>play(i,b);board.appendChild(b)}}function play(i,b){if(gameOver||cells[i])return;cells[i]=current;b.innerHTML=`<img class="face" src="${faces[current]}" alt="${current}">`;b.disabled=true;const line=wins.find(l=>l.every(n=>cells[n]===current));if(line){gameOver=true;line.forEach(n=>board.children[n].classList.add('winning'));statusEl.textContent=`${current} wins!`;[...board.children].forEach(c=>c.disabled=true);return}if(cells.every(Boolean)){gameOver=true;statusEl.textContent="It's a tie!";return}current=current==='X'?'O':'X';statusEl.textContent=`${current}'s turn`}reset.onclick=init;init();
</script></body></html>
